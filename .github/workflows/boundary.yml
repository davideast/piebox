# Piebox boundary check.
#
# Runs `bash scripts/boundary-test.sh` on every push and PR. The
# script asserts that designated "core" paths do not import from
# packages that should live behind driver adapters.
#
# Step 6 of the composable-sandbox migration plan FLIPPED this from
# report-only mode to a hard FAIL on any non-zero exit. Steps 1–5
# drained the original 21 baseline violations to zero across the
# multi-path matrix; from here, any new import that crosses a
# boundary is a real regression that should block the PR.
#
# To intentionally introduce a new banned package (e.g. add a new
# SDK to one of the driver packages), update the BANNED array in
# `scripts/boundary-test.sh` and adjust the matrix as needed.
# Document the rationale in the PR description.
name: Boundary check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  boundary:
    name: piebox boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run boundary-test.sh
        run: bash scripts/boundary-test.sh
